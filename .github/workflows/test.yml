name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  contrib-llm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: llm/go.mod
      - run: go vet ./...
        working-directory: llm
      - run: go test -race -count=1 ./...
        working-directory: llm

  contrib-otel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: otel/go.mod
      - run: go vet ./...
        working-directory: otel
      - run: go test -race -count=1 ./...
        working-directory: otel

  contrib-river-outbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: river/outbox/go.mod
      - run: go vet ./...
        working-directory: river/outbox
      - run: go test -race -count=1 ./...
        working-directory: river/outbox
